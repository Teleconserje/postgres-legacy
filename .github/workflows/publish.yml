name: Build and Push Legacy PostgreSQL 9.6

on:
  schedule:
    - cron: "0 0 * * 1"  # Weekly refresh to ensure build stability
  workflow_dispatch:      # Allows you to trigger it manually from the UI

env:
  # Hardcoding the last official stable release of 9.6
  LEGACY_VERSION: "9.6.24"

jobs:
  build-postgres:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Legacy Image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64,linux/amd64
          push: true
          build-args: |
            POSTGRES_VERSION=${{ env.LEGACY_VERSION }}
          tags: |
            ghcr.io/${{ github.repository }}:9.6
            ghcr.io/${{ github.repository }}:${{ env.LEGACY_VERSION }}
            ghcr.io/${{ github.repository }}:latest